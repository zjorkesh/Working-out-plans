<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="src/style.css">
    <title>AI Workout Planner</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
<script src="https://unpkg.com/axios@1.13.2/dist/axios.min.js"></script>
<script src="https://unpkg.com/typewriter-effect@latest/dist/core.js"></script>
</head>
<body>
    <div class="container">    
    <header>
        <h1> AI Workout Planner</h1>
    </header>

    <main>
        <div class="search-section">
            
            <form id="plan-generator-form">
                <input type="text" placeholder="What type of fitness planning?"  required autocomplete="off" class="search-box" id="user-instructions">
                <input type="submit" value="Search" class="search-btn">
            </form>
            <div class="caption">
                e.g., Functional, Yoga, HIIT, Pilates
            </div>
        </div>
        <div class="plan" id="fitness-plan">
            
        </div>
    </main>

    </div>

     <script src="src/index.js"></script>
</body>
